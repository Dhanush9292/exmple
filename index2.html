<html>
<head>
    <title>register page</title>
   <link rel="stylesheet" href="style2.css"/>
</head>
<body>
     <div class="register">
    <h2>Register</h2>
    <form action="">
        <label  for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter name"></br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email"></br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" placeholder="Enter date of birth"></br> 
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="6 digits" ></br>
        <label for="conform-password">Conform Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="6 digits" ><br>
    </br>   
        <button type="submit">Register</button>
    </form>
    </div>
</body>
